# ─── Security ────────────────────────────────────────────────────────────────

# Path to the secrets file (TOML) containing all sensitive keys/tokens.
# See secrets.example.toml for the expected format.
# Default: "secrets.toml"
secrets_file = "secrets.toml"

# Whether to empty the secrets file after reading it at startup,
# so secrets do not remain on disk.
# Set to false during development to avoid re-creating the file each run.
# Default: true
truncate_secrets_file = false

# ─── Bot ─────────────────────────────────────────────────────────────────────

# Unique name for this bot instance. Used in logs and Telegram alerts
# to identify which bot produced the output.
# Required — bot will not start without it. No default.
bot_name = "bono"

# Starting budget in USDC for this bot instance. This is the amount the
# bot is allowed to use for placing orders. Can be updated at runtime
# via the /budget Telegram command.
# Default: 0.00
bot_initial_budget = 4.00

# Your personal Telegram chat ID. The bot sends all notifications to this
# chat and only processes commands received from it. Messages from any
# other chat are silently ignored. Use @userinfobot to find your chat ID.
# Required — bot will not start without it. No default.
bot_telegram_chat_id = 8289100643

# Number of tokio runtime worker threads. More threads help under heavy
# WebSocket load (multiple price feeds + Polymarket); fewer save CPU.
# Range: 1–16
# Default: 2
bot_worker_threads = 3

# How many times per second the engine trading loop ticks (calls execute_tick).
# Higher values = more responsive to price changes but higher CPU usage.
# 1000 = once per millisecond, 20 = once per 50ms.
# Default: 1000
bot_engine_ticks_per_second = 1000

# ─── Notion ──────────────────────────────────────────────────────────────────

# Notion database ID where the bot logs market events (trades, skips).
# Find it in the database URL: notion.so/<database_id>?v=...
# If empty, Notion logging is disabled.
notion_database_id = "32464c09673d80ffa7bac35c983dcbf7"

# ─── Engine ──────────────────────────────────────────────────────────────────

# Trading strategy to use. Each strategy implements different logic for
# deciding when, in which direction, and at what price to place orders.
# Supported: "bono", "konzerva"
# Required — bot will not start without it. No default.
engine_strategy = "bono"

# ─── Market ──────────────────────────────────────────────────────────────────

# Which asset's Up/Down prediction markets to trade on Polymarket.
# Also determines the Binance and Coinbase price feed symbols
# (e.g. "btc" -> BTCUSDT on Binance, BTC-USD on Coinbase).
# Supported: "btc", "eth", "sol", "xrp"
# Default: "btc"
market_asset = "btc"

# Candle interval in minutes. Determines which Polymarket Up/Down market
# the bot discovers (e.g. btc-updown-5m-*) and the Binance kline interval
# used to fetch the strike price.
# Supported: 5, 15
# Default: 5
market_interval_minutes = 5

# Whether to resolve the strike price from Chainlink/Binance history before
# trading a market. When true, the bot waits for a matching price in the
# history buffers; if no strike is found, the market is skipped.
# Set to false for strategies that don't need a strike price.
# Default: true
market_resolve_strike_price = false

# ─── Logger ──────────────────────────────────────────────────────────────────

# Log level filter using env_logger syntax. Accepts a single global level
# or comma-separated per-module overrides.
# Levels: "error", "warn", "info", "debug", "trace"
# Modules: serekes (main), serekes::engine, serekes::strategy,
#          serekes::feeds, serekes::telegram, serekes::notion, serekes::common
# Examples:
#   "info"                          — everything at info
#   "warn,serekes::engine=debug"    — engine at debug, rest at warn
#   "info,serekes::feeds=warn"      — feeds quieter, rest at info
#   "info,serekes=debug"            — all bot modules at debug
# Default: "info"
logger_level = "serekes=debug"

# ─── Feeds ───────────────────────────────────────────────────────────────────

# Price history buffer sizes in seconds. The bot keeps a rolling window
# of recent prices for each feed. Entries older than the window are evicted.
# Strategies can access these histories via TickContext for lookback analysis.
# When not set, each defaults to the market window (market_interval_minutes * 60).
# feeds_binance_history_secs = 300
# feeds_chainlink_history_secs = 300
