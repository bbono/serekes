# Log level: "error", "warn", "info", "debug", "trace" (default: "info")
log_level = "info"

[wallet]
# Path to file containing the Polygon wallet private key (default: ".key")
# If the key file exists and contains a valid key, bot runs in LIVE mode
# If the key file is missing or empty, bot runs in PAPER mode
key_file = ".key"

[market]
# Asset to trade (used for Polymarket slug and Binance/Coinbase price feeds)
# Supported: "btc", "eth", "sol", "xrp" (default: "btc")
asset = "btc"
# Candle interval in minutes. Supported values: 5 (5m), 15 (15m)
# Determines which Polymarket up/down market to discover and the Binance kline interval (default: 5)
interval_minutes = 5

[engine]
# Max allowed absolute price divergence ($) between Coinbase and Binance before triggering killswitch
# If exceeded, all trading activity is halted (default: 50.0)
exchange_price_divergence_threshold = 50.0
# Minimum seconds between engine log outputs, supports decimals (default: 0.5)
log_interval_secs = 1
# Price history retention in seconds. Evicts entries older than the window.
# All default to market window (interval_minutes * 60) when not set.
# binance_history_secs = 300
# chainlink_history_secs = 300
# dvol_history_secs = 300
