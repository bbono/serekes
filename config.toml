# ─── Bot ─────────────────────────────────────────────────────────────

[bot]
# Unique name for this bot instance. Used in logs and alerts to identify
# which bot produced the output. Required — bot will not start without it.
# No default.
name = "bono"

# Path to a file containing the Polygon wallet private key (hex string).
# If the file exists and contains a valid key → bot runs in LIVE mode (real orders).
# If the file is missing or empty → bot runs in PAPER mode (simulated fills).
# Default: ".key"
key_file = ".key"

# Whether to empty the key file after reading the private key,
# so the key doesn't remain on disk.
# Default: true
truncate_key_file = true

# Number of tokio runtime worker threads.
# More threads help under heavy WebSocket load; fewer threads save CPU.
# Range: 1–16
# Default: 2
worker_threads = 3

# How many times per second the engine trading loop ticks (calls execute_tick).
# Higher = more responsive but higher CPU. 1000 = once per ms, 20 = once per 50ms.
# Default: 1000
engine_ticks_per_second = 1000

# Starting budget in USDC for this bot instance.
# Default: 0.00
initial_budget = 4.00

# ─── Market ───────────────────────────────────────────────────────────────────

[market]
# Which asset's Up/Down prediction markets to trade on Polymarket.
# Also determines the Binance and Coinbase price feed symbols
# (e.g. "btc" → BTCUSDT on Binance, BTC-USD on Coinbase).
# Supported: "btc", "eth", "sol", "xrp"
# Default: "btc"
asset = "btc"

# Candle interval in minutes. Determines which Polymarket Up/Down market
# the bot discovers (e.g. btc-updown-5m-*) and the Binance kline interval
# used to fetch the strike price.
# Supported: 5, 15
# Default: 5
interval_minutes = 5

# Whether to resolve the strike price from Chainlink/Binance history before
# trading a market. When true, the bot waits for a matching price in the
# history buffers; if no strike is found, the market is skipped.
# Set to false for strategies that don't need a strike price.
# Default: true
resolve_strike_price = false

# ─── Logger ────────────────────────────────────────────────────────────────────

[logger]
# Log level filter using env_logger syntax. A single global level, or
# comma-separated with per-module overrides.
# Levels: "error", "warn", "info", "debug", "trace"
# Modules: serekes::bot, serekes::engine, serekes::strategy::bono
# Examples:
#   "info"                                  — everything at info
#   "warn,serekes::engine=debug"            — engine at debug, rest at warn
#   "info,serekes::bot=warn"                — bot quieter, rest at info
# Default: "info"
level = "info"

# Whether to show timestamps in log output.
# Default: true
show_timestamp = true

# Whether to show the source module path in log output.
# Default: true
show_module = true

# ─── Feeds ─────────────────────────────────────────────────────────────────────

[feeds]
# Price history buffer sizes in seconds. The bot keeps a rolling window
# of recent prices for each feed. Entries older than the window are evicted.
# Strategies can access these histories via TickContext for lookback analysis.
# When not set, each defaults to the market window (interval_minutes * 60).
# binance_history_secs = 300
# chainlink_history_secs = 300
# dvol_history_secs = 300

# ─── Telegram ──────────────────────────────────────────────────────────────────

[telegram]
# Bot API token from @BotFather. Required to enable Telegram integration.
# If empty or missing, Telegram is disabled.
bot_token = "8751740744:AAHK4IEHU69ods3L-K48bllZRUe8WxhG97M"

# Your Telegram chat ID. The bot sends notifications here and only
# responds to commands from this chat. Use @userinfobot to find yours.
