# Copy this file to secrets.toml and fill in your values.
#
# All fields are optional unless noted. Empty or missing values
# are treated as absent.

# Polygon wallet private key (hex string).
# If empty or missing, bot runs in PAPER mode (no real trades).
polygon_private_key = ""

# Telegram Bot API token from @BotFather.
# Required — bot will not start without it.
telegram_bot_token = ""

# Notion internal integration secret for logging market events.
# Create an integration at notion.so/my-integrations.
# If empty or missing, Notion logging is disabled.
notion_integration_secret = ""
